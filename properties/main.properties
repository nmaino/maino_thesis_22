#min number of occurrences in order to take a label
#LinkedMDB: 200, r-LinkedMDB: 20, r-IMDB: 200, IMDB: 200, LUBM1M: 100
#BSBM1M: 100
threshold=20

#max number of labels we are going to take
#LinkedMDB: 200, r-LinkedMDB: 200, r-IMDB: 30 (there are very few properties here)
#LUBM1M:  30, BSBM1M: 50
k=200

# ---------- phase 3
#LinkedMDB, r-LinkedMDB, r-IMDB. Our queries don't go beyond 2
tau=2

#4 LinkedMDB: 3, 4
#r-LinkedMDB: in 1, out 3 (because sometimes there is only 1 link to the node)
#r-IMDB: 2, 5,
#IMDB: 4, 5
#LUBM_1m: out 2, in 3
#BSBM1M: out 3, in 2
lambda.in=3
lambda.out=4






# ---------- TSA+BM25

answer.list.length=10000


#CRUCIAL
#rLMDB: 50, LinkedMDB: 20, IMDB: 40, LUBM1M: 20 - percentage of overlapping
compression.threshold=30
#rLMDB: 30, LinkedMDB: 5, IMDB: 10; LUBM1M: 10 - how many graphs are considered
lookahead.threshold=30

# ---------- TSA+VDP
#this is the number of the first top k graphs from the run file that we use
#to build the query graph. It represents the trade off between exploration of the whole
#set of potential answer graphs and the necessity to be quick
#make it smaller if the algorithm is not able to finish in time
#standard: 100
#LUBM: 250 but also 1000 is ok (little increment)
smart.traversal.limit=100

#tau of the BFS performed on the VDP phase when looking for answers
virtual.graphs.tau=3

#limitations on the number of answers extracted from
#one subgraph for the Backward algorithm
too.many.answers.for.this.algorithm=100
too.many.answers.for.this.subgraph=5
too.many.answers.for.one.root=5



